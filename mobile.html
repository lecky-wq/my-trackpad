<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #4ade80; overflow: hidden; touch-action: none; font-family: monospace; }
        #pad { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #btn-gyro { padding: 15px 30px; background: #4ade80; color: #000; border: none; border-radius: 50px; font-weight: 900; z-index: 100; cursor: pointer; }
        #vibe-dot { position: absolute; width: 60px; height: 60px; border: 2px solid #4ade80; border-radius: 50%; pointer-events: none; opacity: 0; transform: translate(-50%, -50%); }
        .status { position: absolute; bottom: 30px; font-size: 10px; opacity: 0.6; }
    </style>
</head>
<body>
    <div id="pad">
        <button id="btn-gyro">开启感应控制</button>
        <div id="vibe-dot"></div>
        <div class="status" id="stat">CONNECTING P2P...</div>
    </div>

<script>
    const stat = document.getElementById('stat');
    const dot = document.getElementById('vibe-dot');
    const peer = new Peer();
    const targetID = new URLSearchParams(window.location.search).get('peer');
    let conn = null, initialDist = 0, currentScale = 1;
    let gyro = { b: 0, g: 0 };

    // 1. P2P 连接
    peer.on('open', () => {
        if(targetID) {
            conn = peer.connect(targetID);
            conn.on('open', () => stat.innerText = "READY: TOUCH & TILT");
        }
    });

    // 2. 权限请求与重力感应
    document.getElementById('btn-gyro').onclick = async () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== 'granted') return;
        }
        window.addEventListener('deviceorientation', (e) => {
            gyro.b = e.beta; // 前后
            gyro.g = e.gamma; // 左右
        });
        document.getElementById('btn-gyro').style.display = 'none';
    };

    const getDist = (t1, t2) => Math.hypot(t2.pageX - t1.pageX, t2.pageY - t1.pageY);
    const triggerHaptic = (ms) => navigator.vibrate && navigator.vibrate(ms);

    // 3. 交互发送逻辑
    window.addEventListener('touchmove', (e) => {
        if (!conn || !conn.open) return;
        e.preventDefault();
        const t = e.touches[0];
        
        if (e.touches.length === 2) {
            if (initialDist === 0) initialDist = getDist(e.touches[0], e.touches[1]);
            const newScale = getDist(e.touches[0], e.touches[1]) / initialDist;
            if (Math.abs(newScale - currentScale) > 0.1) triggerHaptic(10); // 刻度震动
            currentScale = newScale;
        }

        conn.send({
            x: t.pageX / window.innerWidth,
            y: t.pageY / window.innerHeight,
            s: currentScale,
            gb: gyro.b,
            gg: gyro.g
        });

        dot.style.opacity = 1;
        dot.style.left = t.pageX + 'px';
        dot.style.top = t.pageY + 'px';
        dot.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
    });

    window.addEventListener('touchend', () => { initialDist = 0; dot.style.opacity = 0; });
</script>
</body>
</html>
