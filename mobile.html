<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trackpad Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #4ade80; overflow: hidden; touch-action: none; font-family: monospace; }
        #pad { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #111; }
        .status { font-size: 12px; letter-spacing: 2px; margin-top: 10px; }
        .vibe { position: absolute; width: 60px; height: 60px; border: 2px solid #4ade80; border-radius: 50%; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body>
    <div id="pad">
        <div id="vibe" class="vibe"></div>
        <div class="status" id="stat">CONNECTING TO PC...</div>
    </div>

<script>
    const stat = document.getElementById('stat');
    const vibe = document.getElementById('vibe');
    const peer = new Peer();
    let conn = null, initialDist = 0, currentScale = 1;

    // 从 URL 获取电脑端的 Peer ID
    const targetID = new URLSearchParams(window.location.search).get('peer');

    peer.on('open', () => {
        if(targetID) {
            conn = peer.connect(targetID);
            conn.on('open', () => stat.innerText = "CONNECTED: READY TO SLIDE");
            conn.on('close', () => stat.innerText = "CONNECTION LOST");
        }
    });

    const getDist = (t1, t2) => Math.hypot(t2.pageX - t1.pageX, t2.pageY - t1.pageY);

    window.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) initialDist = getDist(e.touches[0], e.touches[1]);
        vibe.style.opacity = 1;
    });

    window.addEventListener('touchmove', (e) => {
        if (!conn || !conn.open) return;
        const t1 = e.touches[0];
        
        // 1. 缩放逻辑
        if (e.touches.length === 2) {
            const newDist = getDist(e.touches[0], e.touches[1]);
            currentScale = (newDist / initialDist);
        }

        // 2. 发送数据 (归一化坐标 + 缩放)
        conn.send({
            x: t1.pageX / window.innerWidth,
            y: t1.pageY / window.innerHeight,
            s: currentScale
        });

        vibe.style.left = t1.pageX + 'px';
        vibe.style.top = t1.pageY + 'px';
    });

    window.addEventListener('touchend', () => vibe.style.opacity = 0);
</script>
</body>
</html>
