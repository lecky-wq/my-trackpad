<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Trackpad</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #4ade80; overflow: hidden; touch-action: none; font-family: monospace; text-align: center; }
        #pad { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; border: 4px solid #111; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="pad"><div id="stat">CONNECTING...</div></div>
<script>
    const stat = document.getElementById('stat');
    const peer = new Peer();
    const targetID = new URLSearchParams(window.location.search).get('peer');
    let conn = null, initialDist = 0, currentScale = 1;

    peer.on('open', () => {
        if(targetID) {
            conn = peer.connect(targetID);
            conn.on('open', () => stat.innerText = "CONNECTED! SLIDE & PINCH");
        }
    });

    const getDist = (t1, t2) => Math.hypot(t2.pageX - t1.pageX, t2.pageY - t1.pageY);

    window.addEventListener('touchmove', (e) => {
        if (!conn || !conn.open) return;
        e.preventDefault();
        const t1 = e.touches[0];
        if (e.touches.length === 2) {
            if (initialDist === 0) initialDist = getDist(e.touches[0], e.touches[1]);
            currentScale = getDist(e.touches[0], e.touches[1]) / initialDist;
        }
        conn.send({ x: t1.pageX / window.innerWidth, y: t1.pageY / window.innerHeight, s: currentScale });
    });
    window.addEventListener('touchstart', (e) => { if(e.touches.length < 2) initialDist = 0; });
</script>
</body>
</html>
